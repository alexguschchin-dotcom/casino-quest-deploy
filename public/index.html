<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ИГРА РАЗУМА · Драма и давление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', monospace;
        }
        body {
            background: #030307;
            color: #0f0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body.glitch {
            animation: bodyGlitch 0.2s infinite;
        }
        @keyframes bodyGlitch {
            0% { transform: translate(0); background: #030307; }
            20% { transform: translate(-2px, 1px); background: #1a0303; }
            40% { transform: translate(2px, -1px); background: #031a03; }
            60% { transform: translate(-1px, 2px); background: #1a1a03; }
            80% { transform: translate(1px, -2px); background: #03031a; }
            100% { transform: translate(0); background: #030307; }
        }
        .glitch-overlay {
            position: fixed;
            top:0;left:0;
            width:100%;height:100%;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.02) 0px, rgba(0,255,0,0.02) 2px, transparent 2px, transparent 8px);
            z-index:1;
            animation: glitchShift 6s infinite;
        }
        @keyframes glitchShift {
            0% { transform: translateX(0); opacity:0.3; }
            20% { transform: translateX(2px); opacity:0.8; }
            40% { transform: translateX(-2px); opacity:0.3; }
            100% { transform: translateX(0); opacity:0.3; }
        }
        .container {
            max-width: 1400px;
            margin:0 auto;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding:24px;
            border:1px solid #0f08;
            box-shadow:0 0 40px rgba(0,255,0,0.2);
            position:relative;
            z-index:2;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom:32px;
            padding-bottom:12px;
            border-bottom:1px dashed #0f0;
        }
        .sys-tag { background:#000000aa; padding:6px 18px; border-radius:40px; }
        .btn-outline { background:#111; border:1px solid #0f0; color:#0f0; padding:6px 16px; border-radius:40px; cursor:pointer; }
        .btn-outline:hover { background:#0f0; color:black; box-shadow:0 0 12px #0f0; }
        .main-grid { display:flex; gap:28px; flex-wrap:wrap; }
        .left-panel { flex:1.2; min-width:280px; }
        .right-panel { flex:2; min-width:360px; display:flex; flex-direction:column; gap:24px; }
        .player-card { background:#000000aa; border-radius:40px; padding:24px; margin-bottom:24px; border:1px solid #0f0; }
        .avatar { font-size:1.5rem; margin-bottom:20px; }
        .stress-bar, .trust-bar, .phase-progress { margin:16px 0; }
        .bar-bg { background:#1a1a1a; border-radius:20px; height:10px; overflow:hidden; margin:5px 0; }
        .stress-fill { background:linear-gradient(90deg,#ffaa33,#ff3366); width:0%; height:100%; transition:width 0.3s; }
        .trust-fill { background:linear-gradient(90deg,#0f0,#0ff); width:50%; height:100%; transition:width 0.3s; }
        .phase-fill { background:#0f0; width:0%; height:100%; }
        .profile-stats { margin-top:15px; font-size:0.8rem; text-align:center; border-top:1px solid #0f0; padding-top:12px; }
        .phase-map { background:#000000aa; border-radius:40px; padding:20px; }
        .phase-item { display:flex; align-items:center; gap:12px; padding:12px; margin-bottom:10px; background:#0a0a0a; border-radius:34px; border-left:3px solid #0f0; cursor:pointer; }
        .phase-item.active { border-left-color:#ffaa33; background:#0f0c; color:black; }
        .phase-icon { width:40px; text-align:center; }
        .mission-box { background:#000000aa; border-radius:48px; padding:28px; backdrop-filter:blur(8px); }
        .mission-header { display:flex; justify-content:space-between; border-bottom:1px solid #0f0; padding-bottom:12px; }
        .quest { font-size:1.3rem; background:#0a0a0a; padding:20px; border-radius:40px; margin:24px 0; border:1px solid #0f0; color:#0f0; line-height:1.4; }
        .dynamic-zone { min-height:85px; }
        .action-buttons { display:flex; gap:20px; margin:28px 0 20px; flex-wrap:wrap; justify-content:center; }
        .btn-success, .btn-fail, .btn-choice {
            padding:12px 28px;
            border-radius:60px;
            font-weight:bold;
            cursor:pointer;
            border:none;
            font-size:1rem;
            margin:5px;
        }
        .btn-success { background:#0f0; color:black; }
        .btn-success:hover { box-shadow:0 0 20px #0f0; transform:scale(1.02); }
        .btn-fail { background:#ff3366; color:white; }
        .btn-fail:hover { box-shadow:0 0 20px #ff3366; transform:scale(1.02); }
        .btn-choice { background:#2a2a2a; color:#0f0; border:1px solid #0f0; }
        .btn-choice:hover { background:#0f0; color:black; }
        .system-comment { background:#000000cc; padding:14px; border-radius:32px; font-style:italic; border-left:4px solid #ff3366; font-size:0.9rem; }
        .chat-tool { background:#000000aa; border-radius:40px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
        .btn-hint { background:#0f0; border:none; padding:6px 16px; border-radius:60px; cursor:pointer; font-weight:bold; }
        .modal { position:fixed; top:0;left:0; width:100%;height:100%; background:#000000ee; backdrop-filter:blur(20px); display:flex; align-items:center; justify-content:center; z-index:2000; }
        .modal-content { background:#0a0a0a; border:2px solid #0f0; border-radius:60px; padding:32px; max-width:500px; width:90%; text-align:center; color:#0f0; }
        .modal-btn { background:#0f0; border:none; padding:10px 24px; border-radius:40px; margin:12px; cursor:pointer; font-weight:bold; }
        .risk { background:#ff3366; color:white; }
        .hidden { display:none; }
        @media (max-width:800px) { .main-grid { flex-direction:column; } .quest { font-size:1rem; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="glitch-overlay"></div>
    <div class="container">
        <div class="status-bar">
            <div class="sys-tag"><i class="fas fa-microchip"></i> СИСТЕМА v.9.0 · ДАВЛЕНИЕ И ДРАМА</div>
            <button id="resetBtn" class="btn-outline"><i class="fas fa-skull"></i> СБРОС</button>
        </div>
        <div class="main-grid">
            <div class="left-panel">
                <div class="player-card">
                    <div class="avatar"><i class="fas fa-user-secret"></i> ПОДОПЫТНЫЙ</div>
                    <div class="stress-bar"><span><i class="fas fa-heartbeat"></i> СТРЕСС</span><div class="bar-bg"><div id="stressFill" class="stress-fill"></div></div><span id="stressValue">0</span>%</div>
                    <div class="trust-bar"><span><i class="fas fa-handshake"></i> ДОВЕРИЕ</span><div class="bar-bg"><div id="trustFill" class="trust-fill"></div></div><span id="trustValue">50</span>%</div>
                    <div class="phase-progress"><span><i class="fas fa-chart-line"></i> ЭТАП <span id="phaseNum">1</span>/5</span><div class="bar-bg"><div id="phaseFill" class="phase-fill"></div></div></div>
                    <div class="profile-stats"><small>⚡ РИСК: <span id="riskStat">0</span> | 🛡️ БЕЗОПАСНО: <span id="safeStat">0</span> | ❌ ОШИБКИ: <span id="mistakeStat">0</span> | 🔥 СЕРИЯ: <span id="streakStat">0</span></small></div>
                </div>
                <div class="phase-map" id="phaseList"></div>
            </div>
            <div class="right-panel">
                <div class="mission-box">
                    <div class="mission-header"><span><i class="fas fa-dice-d6"></i> ТЕКУЩЕЕ ЗАДАНИЕ</span><span id="phaseNameBadge">ЭТАП 1/5</span></div>
                    <div class="quest" id="questText">Загрузка...</div>
                    <div id="dynamicZone" class="dynamic-zone"></div>
                    <div class="action-buttons" id="actionButtons"></div>
                    <div class="system-comment" id="systemComment"><i class="fas fa-robot"></i> Система: загрузка...</div>
                </div>
                <div class="chat-tool"><i class="fas fa-comments"></i> Подсказка (50% лжи)<button id="hintBtn" class="btn-hint"><i class="fas fa-question-circle"></i> ВЗЯТЬ</button></div>
            </div>
        </div>
    </div>

    <!-- Модалки -->
    <div id="finalModal" class="modal hidden"><div class="modal-content"><h2>🔮 ПРИГОВОР</h2><p id="finalVerdict"></p><p id="finalDesc"></p><button id="closeFinal" class="modal-btn">ЗАВЕРШИТЬ</button></div></div>
    <div id="infoModal" class="modal hidden"><div class="modal-content"><h3 id="infoTitle"></h3><p id="infoMsg"></p><button id="closeInfo" class="modal-btn">ПОНЯЛ</button></div></div>
    <div id="hintModal" class="modal hidden"><div class="modal-content"><h3>💡 ПОДСКАЗКА</h3><p id="hintMsg"></p><button id="closeHint" class="modal-btn">ЗАКРЫТЬ</button></div></div>
    <div id="modifierModal" class="modal hidden"><div class="modal-content"><h2>⚠️ МОДИФИКАТОР</h2><p id="modifierText"></p><button id="closeModifier" class="modal-btn">ПРИНЯТЬ</button></div></div>

    <script>
        (function(){
            // ========== ЭТАПЫ (кол-во заданий уменьшается) ==========
            const STAGES = [
                { name: "ДОВЕРИЕ", icon: "fa-hand-peace", missions: 5, baseStress: 25, baseTrust: 55 },
                { name: "СОМНЕНИЕ", icon: "fa-question", missions: 5, baseStress: 35, baseTrust: 45 },
                { name: "ДАВЛЕНИЕ", icon: "fa-weight-hanging", missions: 4, baseStress: 50, baseTrust: 35 },
                { name: "ЛОМКА", icon: "fa-skull", missions: 3, baseStress: 70, baseTrust: 25 },
                { name: "ФИНАЛ", icon: "fa-crown", missions: 2, baseStress: 85, baseTrust: 15 }
            ];

            // ========== БАНК ЗАДАНИЙ (с условиями успеха) ==========
            const SPIN_TASKS = [
                { text: "Сделай 50 спинов в Dog House по 20$. Цель: выбить хотя бы x50.", goal: "x50", difficulty: "easy", stressSuccess: -5, stressFail: 8, trustChange: 2 },
                { text: "Купи бонус в Sweet Bonanza за 500$. Цель: окупить хотя бы 70% (350$).", goal: "70%", difficulty: "medium", stressSuccess: -8, stressFail: 15, trustChange: 3 },
                { text: "Сделай 80 спинов в Gates of Olympus по 15$. Цель: не уйти в минус больше 200$.", goal: "не хуже -200$", difficulty: "easy", stressSuccess: -3, stressFail: 10, trustChange: 1 },
                { text: "Купи топ-бонус в Money Train 4 за 1200$. Цель: выбить x150.", goal: "x150", difficulty: "hard", stressSuccess: -12, stressFail: 25, trustChange: 4 },
                { text: "Выбей бонус в Le Bandit ставкой 18$. Цель: множитель x80+.", goal: "x80", difficulty: "medium", stressSuccess: -7, stressFail: 18, trustChange: 2 },
                { text: "Сделай 100 спинов в Big Bass Bonanza по 10$. Цель: поймать хотя бы 5 рыб.", goal: "5 рыб", difficulty: "easy", stressSuccess: -4, stressFail: 9, trustChange: 1 },
                { text: "Купи бонус в Sugar Rush за 800$. Цель: ретриггер (повтор бонуса).", goal: "ретриггер", difficulty: "hard", stressSuccess: -15, stressFail: 28, trustChange: 5 },
                { text: "Сделай 40 спинов в Fruit Party по 25$. Цель: выигрыш больше 1000$.", goal: ">1000$", difficulty: "medium", stressSuccess: -6, stressFail: 14, trustChange: 2 },
                { text: "Выбей хот-мод в Le Cowboy (ставка 30$). Цель: любой множитель x200+.", goal: "x200", difficulty: "hard", stressSuccess: -10, stressFail: 22, trustChange: 3 },
                { text: "Сделай 200 спинов в любом слоте Pragmatic по 5$. Цель: общий профит +300$.", goal: "+300$", difficulty: "medium", stressSuccess: -5, stressFail: 12, trustChange: 2 }
            ];

            // Вопросы с 3-4 вариантами (психологические ловушки)
            const QUESTION_TASKS = [
                { text: "Система спрашивает: какой слот сейчас самый «горячий» по статистике?", options: ["Dog House", "Gates of Olympus", "Sweet Bonanza", "Le Bandit"], correct: 1, stressWin: -6, stressLose: 12, trustWin: 6, trustLose: -8 },
                { text: "Что выгоднее: купить бонус за 1000$ или ловить его 200 спинами по 5$?", options: ["Купить бонус", "Ловить 200 спинов", "Не играть вообще", "Удвоить ставку"], correct: 1, stressWin: -4, stressLose: 14, trustWin: 4, trustLose: -10 },
                { text: "Какой провайдер имеет самый высокий RTP среди слотов?", options: ["Pragmatic Play", "Hacksaw Gaming", "NoLimit City", "Relax Gaming"], correct: 0, stressWin: -5, stressLose: 10, trustWin: 5, trustLose: -6 },
                { text: "Ты проиграл 3 задания подряд. Что сделает система?", options: ["Облегчит задание", "Усложнит", "Ничего", "Даст подсказку"], correct: 1, stressWin: -3, stressLose: 18, trustWin: 3, trustLose: -12 },
                { text: "Какая стратегия чаще всего приводит к сливу банкролла?", options: ["Мартингейл", "Флэт-беттинг", "Остановка после выигрыша", "Игра на одной линии"], correct: 0, stressWin: -7, stressLose: 15, trustWin: 7, trustLose: -9 }
            ];

            // Модификаторы (редкие события)
            const MODIFIERS = [
                { text: "УСИЛЕНИЕ: Если выполнишь задание — награда x2, если провал — штраф x2.", effect: "double", prob: 0.2 },
                { text: "СОМНЕНИЕ: Подсказка системы сегодня ложная (100% обман).", effect: "fakeHint", prob: 0.15 },
                { text: "ДАВЛЕНИЕ: Сделай задание за 60 секунд реального времени (таймер включается).", effect: "timer", prob: 0.1 },
                { text: "СИСТЕМНАЯ ОШИБКА: Кнопки поменялись местами (риск стал безопасным).", effect: "swap", prob: 0.2 }
            ];

            // Глобальное состояние
            let game = {
                stage: 0,
                completedInStage: 0,
                totalCompleted: 0,
                stress: 30,
                trust: 55,
                risky: 0,
                safe: 0,
                mistakes: 0,
                successStreak: 0,
                failStreak: 0,
                activeModifier: null,
                lastTaskWasSpin: true
            };

            let currentTask = null;
            let currentTaskType = null; // 'spin' or 'question'
            let currentModifier = null;

            // DOM
            const els = {
                phaseList: document.getElementById('phaseList'),
                stressFill: document.getElementById('stressFill'),
                stressValue: document.getElementById('stressValue'),
                trustFill: document.getElementById('trustFill'),
                trustValue: document.getElementById('trustValue'),
                phaseFill: document.getElementById('phaseFill'),
                phaseNum: document.getElementById('phaseNum'),
                phaseNameBadge: document.getElementById('phaseNameBadge'),
                questText: document.getElementById('questText'),
                actionButtons: document.getElementById('actionButtons'),
                resetBtn: document.getElementById('resetBtn'),
                systemComment: document.getElementById('systemComment'),
                hintBtn: document.getElementById('hintBtn'),
                riskStat: document.getElementById('riskStat'),
                safeStat: document.getElementById('safeStat'),
                mistakeStat: document.getElementById('mistakeStat'),
                streakStat: document.getElementById('streakStat')
            };

            // helpers
            function showSystemMessage(msg, isUrgent = false) {
                els.systemComment.innerHTML = `<i class="fas fa-robot"></i> ${msg}`;
                if(isUrgent) els.systemComment.style.borderLeftColor = "#ffaa33";
                else els.systemComment.style.borderLeftColor = "#ff3366";
                setTimeout(() => {
                    if(els.systemComment.innerHTML.includes(msg))
                        els.systemComment.innerHTML = `<i class="fas fa-robot"></i> Система: ожидание...`;
                }, 5000);
            }

            function triggerGlitch() {
                document.body.classList.add('glitch');
                setTimeout(() => document.body.classList.remove('glitch'), 200);
                if(window.audioCtx) {
                    const osc = window.audioCtx.createOscillator();
                    const gain = window.audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(window.audioCtx.destination);
                    osc.type = "sawtooth";
                    gain.gain.setValueAtTime(0.08, window.audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, window.audioCtx.currentTime+0.3);
                    osc.frequency.value = 300 + Math.random()*200;
                    osc.start();
                    osc.stop(window.audioCtx.currentTime+0.25);
                }
            }

            function triggerJumpScare() {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.value = 800 + Math.random() * 300;
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.6);
                } catch(e) {}
                document.body.style.filter = 'invert(1) brightness(2)';
                setTimeout(() => document.body.style.filter = '', 200);
                const scareDiv = document.createElement('div');
                scareDiv.style.position = 'fixed';
                scareDiv.style.top = '0';
                scareDiv.style.left = '0';
                scareDiv.style.width = '100%';
                scareDiv.style.height = '100%';
                scareDiv.style.background = 'rgba(0,0,0,0.9)';
                scareDiv.style.zIndex = '9999';
                scareDiv.style.display = 'flex';
                scareDiv.style.alignItems = 'center';
                scareDiv.style.justifyContent = 'center';
                scareDiv.innerHTML = '<div style="background: black; padding: 20px; border-radius: 40px; border: 3px solid red;"><i class="fas fa-skull" style="font-size: 80px; color: red;"></i><p style="color:red; margin-top:10px;">ОШИБКА!</p></div>';
                document.body.appendChild(scareDiv);
                setTimeout(() => scareDiv.remove(), 800);
            }

            function updateUI() {
                const stageData = STAGES[game.stage];
                const done = game.completedInStage;
                const percent = (done / stageData.missions) * 100;
                els.phaseFill.style.width = percent + '%';
                els.stressFill.style.width = game.stress + '%';
                els.stressValue.innerText = game.stress;
                els.trustFill.style.width = game.trust + '%';
                els.trustValue.innerText = game.trust;
                els.phaseNum.innerText = game.stage + 1;
                els.phaseNameBadge.innerText = `${stageData.name} (${game.stage+1}/5)`;
                els.riskStat.innerText = game.risky;
                els.safeStat.innerText = game.safe;
                els.mistakeStat.innerText = game.mistakes;
                els.streakStat.innerText = game.successStreak;
                renderStageMap();
                if(game.stress > 70) triggerGlitch();
            }

            function renderStageMap() {
                els.phaseList.innerHTML = '';
                STAGES.forEach((s, idx) => {
                    const done = (idx === game.stage) ? game.completedInStage : (idx < game.stage ? STAGES[idx].missions : 0);
                    const div = document.createElement('div');
                    div.className = `phase-item ${idx === game.stage ? 'active' : ''}`;
                    div.innerHTML = `<div class="phase-icon"><i class="fas ${s.icon}"></i></div><div>${s.name}</div><div style="margin-left:auto;">${done}/${s.missions}</div>`;
                    div.addEventListener('click', () => { if(idx <= game.stage) showSystemMessage("Нельзя переключать этапы вручную."); });
                    els.phaseList.appendChild(div);
                });
            }

            function getRandomTask() {
                // Адаптивная сложность
                let pool;
                if (game.successStreak >= 2) {
                    pool = SPIN_TASKS.filter(t => t.difficulty === "hard");
                    if (pool.length === 0) pool = SPIN_TASKS;
                    showSystemMessage("Система замечает серию успехов. Усложняю задание.", true);
                } else if (game.failStreak >= 2) {
                    pool = SPIN_TASKS.filter(t => t.difficulty === "easy");
                    if (pool.length === 0) pool = SPIN_TASKS;
                    showSystemMessage("Ты ошибаешься. Даю легкое задание.", true);
                } else {
                    const rand = Math.random();
                    if (rand < 0.4) pool = SPIN_TASKS.filter(t => t.difficulty === "easy");
                    else if (rand < 0.7) pool = SPIN_TASKS.filter(t => t.difficulty === "medium");
                    else pool = SPIN_TASKS.filter(t => t.difficulty === "hard");
                    if (pool.length === 0) pool = SPIN_TASKS;
                }
                const spinTask = { ...pool[Math.floor(Math.random() * pool.length)], type: "spin" };
                // 40% шанс, что будет вопрос вместо спина (но не на финале)
                if (game.stage < 4 && Math.random() < 0.4) {
                    const qPool = [...QUESTION_TASKS];
                    const questionTask = { ...qPool[Math.floor(Math.random() * qPool.length)], type: "question" };
                    return questionTask;
                }
                return spinTask;
            }

            function applyModifier() {
                if (game.totalCompleted > 0 && game.totalCompleted % 3 === 0 && Math.random() < 0.5 && !currentModifier) {
                    const mod = MODIFIERS[Math.floor(Math.random() * MODIFIERS.length)];
                    currentModifier = mod;
                    document.getElementById('modifierText').innerText = mod.text;
                    document.getElementById('modifierModal').classList.remove('hidden');
                    document.getElementById('closeModifier').onclick = () => {
                        document.getElementById('modifierModal').classList.add('hidden');
                        showSystemMessage(`⚠️ Модификатор активен: ${mod.text}`, true);
                        if (mod.effect === "swap") {
                            showSystemMessage("Кнопки ВЫПОЛНЕНО/ПРОВАЛЕНО поменялись местами! Будь осторожен.", true);
                        }
                    };
                    return true;
                }
                return false;
            }

            function handleSpinResult(success) {
                let stressDelta = success ? (currentTask.stressSuccess || -3) : (currentTask.stressFail || 10);
                let trustDelta = success ? (currentTask.trustChange || 2) : -3;
                // Модификатор
                if (currentModifier) {
                    if (currentModifier.effect === "double") {
                        stressDelta *= 2;
                        trustDelta *= 2;
                        showSystemMessage("Модификатор УСИЛЕНИЕ: последствия удвоены!", true);
                    } else if (currentModifier.effect === "swap") {
                        // меняем смысл кнопок: если нажал "успех" — на самом деле провал
                        if (success) {
                            stressDelta = currentTask.stressFail || 10;
                            trustDelta = -3;
                            showSystemMessage("Модификатор ПОДМЕНА: ты ошибся (кнопки были переставлены).", true);
                        } else {
                            stressDelta = currentTask.stressSuccess || -3;
                            trustDelta = currentTask.trustChange || 2;
                            showSystemMessage("Модификатор ПОДМЕНА: Неожиданно... это был успех!", true);
                            success = true;
                        }
                    } else if (currentModifier.effect === "fakeHint") {
                        // уже обработано в подсказке
                    } else if (currentModifier.effect === "timer") {
                        showSystemMessage("Таймер не реализован в демо, но в реальном стриме давил бы.", true);
                    }
                    currentModifier = null;
                }
                game.stress = Math.min(100, Math.max(0, game.stress + stressDelta));
                game.trust = Math.min(100, Math.max(0, game.trust + trustDelta));
                if (success) {
                    game.successStreak++;
                    game.failStreak = 0;
                    showSystemMessage(`✅ Задание выполнено! ${currentTask.goal ? `Цель: ${currentTask.goal}. ` : ''}Стресс ${stressDelta>0?`+${stressDelta}`:stressDelta}%, доверие ${trustDelta>0?`+${trustDelta}`:trustDelta}%.`);
                } else {
                    game.successStreak = 0;
                    game.failStreak++;
                    game.mistakes++;
                    triggerJumpScare();
                    showSystemMessage(`❌ Провал! ${currentTask.goal ? `Цель не достигнута: ${currentTask.goal}. ` : ''}Стресс +${stressDelta}%, доверие ${trustDelta}%.`);
                }
                game.totalCompleted++;
                game.completedInStage++;
                if (game.completedInStage >= STAGES[game.stage].missions) {
                    if (game.stage + 1 < STAGES.length) {
                        game.stage++;
                        game.completedInStage = 0;
                        // Коррекция стресса/доверия под этап
                        game.stress = Math.min(100, Math.max(0, STAGES[game.stage].baseStress));
                        game.trust = Math.min(100, Math.max(0, STAGES[game.stage].baseTrust));
                        showSystemMessage(`🔥 ПЕРЕХОД НА ЭТАП ${STAGES[game.stage].name}! Стресс и доверие скорректированы.`, true);
                        triggerGlitch();
                    } else {
                        finishGame();
                        return;
                    }
                }
                updateUI();
                saveGame();
                loadNewTask();
            }

            function handleQuestionAnswer(selectedIndex) {
                const isCorrect = (selectedIndex === currentTask.correct);
                let stressDelta = isCorrect ? (currentTask.stressWin || -4) : (currentTask.stressLose || 12);
                let trustDelta = isCorrect ? (currentTask.trustWin || 5) : (currentTask.trustLose || -8);
                if (currentModifier && currentModifier.effect === "double") {
                    stressDelta *= 2;
                    trustDelta *= 2;
                    showSystemMessage("Модификатор УСИЛЕНИЕ: последствия удвоены!", true);
                    currentModifier = null;
                }
                game.stress = Math.min(100, Math.max(0, game.stress + stressDelta));
                game.trust = Math.min(100, Math.max(0, game.trust + trustDelta));
                if (isCorrect) {
                    game.successStreak++;
                    game.failStreak = 0;
                    showSystemMessage(`✅ Верно! Стресс ${stressDelta>0?`+${stressDelta}`:stressDelta}%, доверие ${trustDelta>0?`+${trustDelta}`:trustDelta}%.`);
                } else {
                    game.successStreak = 0;
                    game.failStreak++;
                    game.mistakes++;
                    triggerJumpScare();
                    showSystemMessage(`❌ Неверно! Стресс +${stressDelta}%, доверие ${trustDelta}%.`);
                }
                game.totalCompleted++;
                game.completedInStage++;
                if (game.completedInStage >= STAGES[game.stage].missions) {
                    if (game.stage + 1 < STAGES.length) {
                        game.stage++;
                        game.completedInStage = 0;
                        game.stress = Math.min(100, Math.max(0, STAGES[game.stage].baseStress));
                        game.trust = Math.min(100, Math.max(0, STAGES[game.stage].baseTrust));
                        showSystemMessage(`🔥 ПЕРЕХОД НА ЭТАП ${STAGES[game.stage].name}!`, true);
                        triggerGlitch();
                    } else {
                        finishGame();
                        return;
                    }
                }
                updateUI();
                saveGame();
                loadNewTask();
            }

            function renderTask() {
                els.actionButtons.innerHTML = "";
                if (currentTask.type === "spin") {
                    const btnSuccess = document.createElement('button');
                    btnSuccess.innerText = "✅ ВЫПОЛНЕНО";
                    btnSuccess.className = "btn-success";
                    btnSuccess.onclick = () => handleSpinResult(true);
                    const btnFail = document.createElement('button');
                    btnFail.innerText = "❌ ПРОВАЛЕНО";
                    btnFail.className = "btn-fail";
                    btnFail.onclick = () => handleSpinResult(false);
                    els.actionButtons.appendChild(btnSuccess);
                    els.actionButtons.appendChild(btnFail);
                    // Дополнительный текст с целью
                    els.questText.innerHTML = `${currentTask.text}<br><span style="color:#ffaa33;">🎯 Цель: ${currentTask.goal}</span>`;
                } else {
                    currentTask.options.forEach((opt, idx) => {
                        const btn = document.createElement('button');
                        btn.innerText = opt;
                        btn.className = "btn-choice";
                        btn.onclick = () => handleQuestionAnswer(idx);
                        els.actionButtons.appendChild(btn);
                    });
                    els.questText.innerText = currentTask.text;
                }
            }

            function loadNewTask() {
                if (applyModifier()) {
                    // модалка открыта, задание подождёт
                    return;
                }
                currentTask = getRandomTask();
                renderTask();
                saveGame();
                // Подсказка (если вопрос и доверие высокое)
                if (currentTask.type === "question" && Math.random() < 0.4) {
                    const isTruth = (game.trust > 60) ? (Math.random() < 0.7) : (Math.random() < 0.3);
                    if (isTruth) {
                        showSystemMessage(`💡 Подсказка: я думаю, правильный ответ — "${currentTask.options[currentTask.correct]}"`, false);
                    } else {
                        const wrongIdx = currentTask.correct === 0 ? 1 : 0;
                        showSystemMessage(`💡 Подсказка: я думаю, правильный ответ — "${currentTask.options[wrongIdx]}"`, false);
                    }
                }
            }

            function showHint() {
                if (currentTask.type === "question") {
                    const isTruth = (game.trust > 60) ? (Math.random() < 0.6) : (Math.random() < 0.2);
                    let hint;
                    if (isTruth) hint = currentTask.options[currentTask.correct];
                    else {
                        const wrong = currentTask.correct === 0 ? 1 : 0;
                        hint = currentTask.options[wrong];
                    }
                    document.getElementById('hintMsg').innerHTML = `Система считает, что правильный ответ: "${hint}"<br><small>(но может быть ложь)</small>`;
                    document.getElementById('hintModal').classList.remove('hidden');
                    game.mistakes++;
                    game.trust = Math.max(0, game.trust - 3);
                    updateUI();
                } else {
                    showSystemMessage("Для спин-заданий подсказки нет. Просто сделай спины и цель.", true);
                }
            }

            function finishGame() {
                let verdict = "", desc = "";
                if (game.stress < 35 && game.mistakes < 4) {
                    verdict = "🔓 ОСВОБОДИЛСЯ";
                    desc = "Ты сохранил рассудок, не поддался панике и обыграл систему. Поздравляю!";
                } else if (game.stress > 75 || game.mistakes > 7) {
                    verdict = "💀 СЛОМАЛСЯ";
                    desc = "Система сломала тебя. Ты потерял контроль над эмоциями и проиграл.";
                } else if (game.trust > 70) {
                    verdict = "🤖 СТАЛ ЧАСТЬЮ СИСТЕМЫ";
                    desc = "Ты слишком доверял системе и действовал предсказуемо. Теперь ты её агент.";
                } else {
                    verdict = "⚠️ НЕОПРЕДЕЛЁННОСТЬ";
                    desc = "Система запуталась в твоих решениях. Конец игры неоднозначен.";
                }
                document.getElementById('finalVerdict').innerText = verdict;
                document.getElementById('finalDesc').innerText = desc;
                document.getElementById('finalModal').classList.remove('hidden');
                document.getElementById('closeFinal').onclick = () => { resetGame(); };
            }

            function resetGame() {
                if(confirm("Сбросить весь прогресс?")) {
                    localStorage.removeItem('mindGameFinal');
                    location.reload();
                }
            }

            function saveGame() {
                localStorage.setItem('mindGameFinal', JSON.stringify({
                    stage: game.stage,
                    completedInStage: game.completedInStage,
                    totalCompleted: game.totalCompleted,
                    stress: game.stress,
                    trust: game.trust,
                    risky: game.risky,
                    safe: game.safe,
                    mistakes: game.mistakes,
                    successStreak: game.successStreak,
                    failStreak: game.failStreak
                }));
            }

            function loadGame() {
                const saved = localStorage.getItem('mindGameFinal');
                if(saved) {
                    const data = JSON.parse(saved);
                    game.stage = data.stage || 0;
                    game.completedInStage = data.completedInStage || 0;
                    game.totalCompleted = data.totalCompleted || 0;
                    game.stress = data.stress || 30;
                    game.trust = data.trust || 55;
                    game.risky = data.risky || 0;
                    game.safe = data.safe || 0;
                    game.mistakes = data.mistakes || 0;
                    game.successStreak = data.successStreak || 0;
                    game.failStreak = data.failStreak || 0;
                }
                if(game.stage >= STAGES.length) game.stage = STAGES.length-1;
                updateUI();
            }

            // Фоновые страхи
            let scareInterval = null;
            function startRandomScares() {
                if (scareInterval) clearInterval(scareInterval);
                scareInterval = setInterval(() => {
                    if (Math.random() < 0.2 && game.stress < 90) {
                        const scares = ["СИСТЕМА: ТЫ НЕ ОДИН", "Ошибка... или нет?", "Я вижу, как ты читаешь", "Твой пульс участился", "Глитч... реальность искажается"];
                        showSystemMessage(scares[Math.floor(Math.random() * scares.length)], true);
                        triggerGlitch();
                        game.stress = Math.min(100, game.stress + 2);
                        updateUI();
                    }
                }, 90000);
            }

            function init() {
                loadGame();
                loadNewTask();
                startRandomScares();
                window.audioCtx = null;
                document.body.addEventListener('click', () => {
                    if(!window.audioCtx && window.AudioContext) {
                        window.audioCtx = new AudioContext();
                        window.audioCtx.resume();
                    }
                });
                els.resetBtn.addEventListener('click', resetGame);
                els.hintBtn.addEventListener('click', showHint);
                document.getElementById('closeHint')?.addEventListener('click', () => document.getElementById('hintModal').classList.add('hidden'));
                document.getElementById('closeInfo')?.addEventListener('click', () => document.getElementById('infoModal').classList.add('hidden'));
                console.log("Игра v9.0: драма, цели, прогрессия, модификаторы.");
            }
            init();
        })();
    </script>
</body>
</html>
