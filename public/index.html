<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мозаика воспоминаний</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="retro-bg"></div>
    <div class="container">
        <header>
            <h1>🎞️ Мозаика воспоминаний</h1>
            <p class="subtitle">Собираем пазл из нашего прошлого</p>
        </header>

        <div class="game-area">
            <!-- Пазл -->
            <div class="puzzle-container">
                <div id="puzzle-grid" class="puzzle-grid"></div>
            </div>

            <!-- Задание и управление -->
            <div class="task-panel">
                <div class="task-card">
                    <div class="task-number">Задание <span id="task-index">1</span>/<span id="total-tasks">25</span></div>
                    <div class="task-text" id="task-text">Загрузка...</div>
                    <div class="task-type" id="task-type"></div>
                </div>
                <div class="result-panel">
                    <label for="new-score">Новый баланс:</label>
                    <input type="number" id="new-score" placeholder="Введите дублоны" step="100">
                    <div class="buttons">
                        <button id="success-btn" class="btn-success">✅ Успех</button>
                        <button id="fail-btn" class="btn-fail">❌ Провал</button>
                    </div>
                </div>
                <div class="hint-panel">
                    <button id="hint-btn" class="btn-hint">💡 Подсказка</button>
                </div>
            </div>
        </div>

        <div id="toast" class="toast hidden"></div>
        <div id="final-modal" class="modal hidden">
            <div class="modal-content">
                <h2>🎉 Мозаика собрана!</h2>
                <div id="final-image" class="final-image"></div>
                <p>Спасибо, что прошли этот путь вместе!</p>
                <button id="reset-btn" class="btn-neon">🔄 Начать заново</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
