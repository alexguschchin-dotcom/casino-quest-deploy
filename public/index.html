<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИГРА РАЗУМА</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="glitch-overlay"></div>
    <div class="container">
        <div class="status-bar">
            <div class="sys-tag"><i class="fas fa-microchip"></i> СИСТЕМА v.2.0</div>
            <button id="resetBtn" class="btn-outline"><i class="fas fa-skull"></i> СБРОС</button>
        </div>
        <div class="main-grid">
            <div class="left-panel">
                <div class="player-card">
                    <div class="avatar"><i class="fas fa-user-secret"></i> ПОДОПЫТНЫЙ</div>
                    <div class="stress-bar">
                        <span><i class="fas fa-heartbeat"></i> СТРЕСС</span>
                        <div class="bar-bg"><div id="stressFill" class="stress-fill"></div></div>
                        <span id="stressValue">0</span>%
                    </div>
                    <div class="trust-bar">
                        <span><i class="fas fa-handshake"></i> ДОВЕРИЕ</span>
                        <div class="bar-bg"><div id="trustFill" class="trust-fill"></div></div>
                        <span id="trustValue">50</span>%
                    </div>
                    <div class="phase-progress">
                        <span><i class="fas fa-chart-line"></i> ЭТАП <span id="phaseNum">1</span>/5</span>
                        <div class="bar-bg"><div id="phaseFill" class="phase-fill"></div></div>
                    </div>
                    <div class="profile-stats">
                        <small>⚡ РИСК: <span id="riskStat">0</span> | 🛡️ БЕЗОПАСНО: <span id="safeStat">0</span> | ❌ ОШИБКИ: <span id="mistakeStat">0</span></small>
                    </div>
                </div>
                <div class="phase-map" id="phaseList"></div>
            </div>
            <div class="right-panel">
                <div class="mission-box">
                    <div class="mission-header">
                        <span><i class="fas fa-dice-d6"></i> ТЕКУЩЕЕ ЗАДАНИЕ</span>
                        <span id="phaseNameBadge">ЭТАП 1/5</span>
                    </div>
                    <div class="quest" id="questText">Загрузка...</div>
                    <div id="dynamicZone" class="dynamic-zone"></div>
                    <div class="action-buttons">
                        <button id="completeBtn" class="btn-primary"><i class="fas fa-check-double"></i> ВЫПОЛНИТЬ</button>
                        <button id="nextBtn" class="btn-secondary" disabled><i class="fas fa-forward"></i> ДАЛЕЕ</button>
                    </div>
                    <div class="system-comment" id="systemComment">
                        <i class="fas fa-robot"></i> Система: загрузка...
                    </div>
                </div>
                <div class="chat-tool">
                    <i class="fas fa-comments"></i> Чат: <strong>!помощь</strong> — подсказка
                    <button id="hintBtn" class="btn-hint"><i class="fas fa-question-circle"></i> ВЗЯТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалки -->
    <div id="finalModal" class="modal hidden">
        <div class="modal-content">
            <h2>🔮 ПРИГОВОР СИСТЕМЫ</h2>
            <p id="finalVerdict"></p>
            <button id="safeFinal" class="modal-btn">ЗАБРАТЬ</button>
            <button id="riskFinal" class="modal-btn risk">ДОКАЗАТЬ</button>
        </div>
    </div>
    <div id="infoModal" class="modal hidden">
        <div class="modal-content">
            <h3 id="infoTitle"></h3>
            <p id="infoMsg"></p>
            <button id="closeInfo" class="modal-btn">ПОНЯЛ</button>
        </div>
    </div>
    <div id="hintModal" class="modal hidden">
        <div class="modal-content">
            <h3>💡 ПОДСКАЗКА</h3>
            <p id="hintMsg"></p>
            <button id="closeHint" class="modal-btn">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
