<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ИГРА РАЗУМА · Прогрессия сложности</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', monospace;
        }
        body {
            background: #030307;
            color: #0f0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body.glitch {
            animation: bodyGlitch 0.2s infinite;
        }
        @keyframes bodyGlitch {
            0% { transform: translate(0); background: #030307; }
            20% { transform: translate(-2px, 1px); background: #1a0303; }
            40% { transform: translate(2px, -1px); background: #031a03; }
            60% { transform: translate(-1px, 2px); background: #1a1a03; }
            80% { transform: translate(1px, -2px); background: #03031a; }
            100% { transform: translate(0); background: #030307; }
        }
        .glitch-overlay {
            position: fixed;
            top:0;left:0;
            width:100%;height:100%;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.02) 0px, rgba(0,255,0,0.02) 2px, transparent 2px, transparent 8px);
            z-index:1;
            animation: glitchShift 6s infinite;
        }
        @keyframes glitchShift {
            0% { transform: translateX(0); opacity:0.3; }
            20% { transform: translateX(2px); opacity:0.8; }
            40% { transform: translateX(-2px); opacity:0.3; }
            100% { transform: translateX(0); opacity:0.3; }
        }
        .container {
            max-width: 1400px;
            margin:0 auto;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding:24px;
            border:1px solid #0f08;
            box-shadow:0 0 40px rgba(0,255,0,0.2);
            position:relative;
            z-index:2;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom:32px;
            padding-bottom:12px;
            border-bottom:1px dashed #0f0;
        }
        .sys-tag {
            background:#000000aa;
            padding:6px 18px;
            border-radius:40px;
        }
        .btn-outline {
            background:#111;
            border:1px solid #0f0;
            color:#0f0;
            padding:6px 16px;
            border-radius:40px;
            cursor:pointer;
        }
        .btn-outline:hover {
            background:#0f0;
            color:black;
            box-shadow:0 0 12px #0f0;
        }
        .main-grid {
            display:flex;
            gap:28px;
            flex-wrap:wrap;
        }
        .left-panel {
            flex:1.2;
            min-width:280px;
        }
        .right-panel {
            flex:2;
            min-width:360px;
            display:flex;
            flex-direction:column;
            gap:24px;
        }
        .player-card {
            background:#000000aa;
            border-radius:40px;
            padding:24px;
            margin-bottom:24px;
            border:1px solid #0f0;
        }
        .avatar { font-size:1.5rem; margin-bottom:20px; }
        .stress-bar, .trust-bar, .phase-progress { margin:16px 0; }
        .bar-bg {
            background:#1a1a1a;
            border-radius:20px;
            height:10px;
            overflow:hidden;
            margin:5px 0;
        }
        .stress-fill { background:linear-gradient(90deg,#ffaa33,#ff3366); width:0%; height:100%; transition:width 0.3s; }
        .trust-fill { background:linear-gradient(90deg,#0f0,#0ff); width:50%; height:100%; transition:width 0.3s; }
        .phase-fill { background:#0f0; width:0%; height:100%; }
        .profile-stats {
            margin-top:15px;
            font-size:0.8rem;
            text-align:center;
            border-top:1px solid #0f0;
            padding-top:12px;
        }
        .phase-map {
            background:#000000aa;
            border-radius:40px;
            padding:20px;
        }
        .phase-item {
            display:flex;
            align-items:center;
            gap:12px;
            padding:12px;
            margin-bottom:10px;
            background:#0a0a0a;
            border-radius:34px;
            border-left:3px solid #0f0;
            cursor:pointer;
        }
        .phase-item.active {
            border-left-color:#ffaa33;
            background:#0f0c;
            color:black;
        }
        .phase-icon { width:40px; text-align:center; }
        .mission-box {
            background:#000000aa;
            border-radius:48px;
            padding:28px;
            backdrop-filter:blur(8px);
        }
        .mission-header {
            display:flex;
            justify-content:space-between;
            border-bottom:1px solid #0f0;
            padding-bottom:12px;
        }
        .quest {
            font-size:1.4rem;
            background:#0a0a0a;
            padding:20px;
            border-radius:40px;
            margin:24px 0;
            border:1px solid #0f0;
            color:#0f0;
        }
        .action-buttons {
            display:flex;
            gap:20px;
            margin:28px 0 20px;
            flex-wrap:wrap;
            justify-content:center;
        }
        .btn-success, .btn-fail {
            padding:12px 28px;
            border-radius:60px;
            font-weight:bold;
            cursor:pointer;
            border:none;
            font-size:1.1rem;
        }
        .btn-success {
            background:#0f0;
            color:black;
        }
        .btn-success:hover {
            box-shadow:0 0 20px #0f0;
            transform:scale(1.02);
        }
        .btn-fail {
            background:#ff3366;
            color:white;
        }
        .btn-fail:hover {
            box-shadow:0 0 20px #ff3366;
            transform:scale(1.02);
        }
        .system-comment {
            background:#000000cc;
            padding:14px;
            border-radius:32px;
            font-style:italic;
            border-left:4px solid #ff3366;
            font-size:0.9rem;
        }
        .chat-tool {
            background:#000000aa;
            border-radius:40px;
            padding:16px 20px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
            gap:10px;
        }
        .btn-hint {
            background:#0f0;
            border:none;
            padding:6px 16px;
            border-radius:60px;
            cursor:pointer;
            font-weight:bold;
        }
        .option-btn {
            background:#111;
            border:2px solid #0f0;
            color:#0f0;
            padding:12px 24px;
            border-radius:40px;
            cursor:pointer;
            font-weight:bold;
            margin:5px;
            font-size:0.9rem;
        }
        .option-btn:hover {
            background:#0f0;
            color:black;
        }
        .modal {
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            background:#000000ee;
            backdrop-filter:blur(20px);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:2000;
        }
        .modal-content {
            background:#0a0a0a;
            border:2px solid #0f0;
            border-radius:60px;
            padding:32px;
            max-width:500px;
            width:90%;
            text-align:center;
            color:#0f0;
        }
        .modal-btn {
            background:#0f0;
            border:none;
            padding:10px 24px;
            border-radius:40px;
            margin:12px;
            cursor:pointer;
            font-weight:bold;
        }
        .risk { background:#ff3366; color:white; }
        .hidden { display:none; }
        @media (max-width:800px) {
            .main-grid { flex-direction:column; }
            .quest { font-size:1rem; }
            .option-btn { padding:8px 12px; font-size:0.8rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="glitch-overlay"></div>
    <div class="container">
        <div class="status-bar">
            <div class="sys-tag"><i class="fas fa-microchip"></i> СИСТЕМА v.9.0 · ПРОГРЕССИЯ СЛОЖНОСТИ</div>
            <button id="resetBtn" class="btn-outline"><i class="fas fa-skull"></i> СБРОСИТЬ</button>
        </div>
        <div class="main-grid">
            <div class="left-panel">
                <div class="player-card">
                    <div class="avatar"><i class="fas fa-user-secret"></i> ПОДОПЫТНЫЙ</div>
                    <div class="stress-bar">
                        <span><i class="fas fa-heartbeat"></i> СТРЕСС</span>
                        <div class="bar-bg"><div id="stressFill" class="stress-fill"></div></div>
                        <span id="stressValue">0</span>%
                    </div>
                    <div class="trust-bar">
                        <span><i class="fas fa-handshake"></i> ДОВЕРИЕ К СИСТЕМЕ</span>
                        <div class="bar-bg"><div id="trustFill" class="trust-fill"></div></div>
                        <span id="trustValue">50</span>%
                    </div>
                    <div class="phase-progress">
                        <span><i class="fas fa-chart-line"></i> ЭТАП <span id="phaseNum">1</span>/5</span>
                        <div class="bar-bg"><div id="phaseFill" class="phase-fill"></div></div>
                    </div>
                    <div class="profile-stats">
                        <small>⚡ РИСК: <span id="riskStat">0</span> | 🛡️ БЕЗОПАСНО: <span id="safeStat">0</span> | ❌ ОШИБКИ: <span id="mistakeStat">0</span> | 🔥 СЕРИЯ: <span id="streakStat">0</span></small>
                    </div>
                </div>
                <div class="phase-map" id="phaseList"></div>
            </div>
            <div class="right-panel">
                <div class="mission-box">
                    <div class="mission-header">
                        <span><i class="fas fa-dice-d6"></i> ТЕКУЩЕЕ ЗАДАНИЕ</span>
                        <span id="phaseNameBadge">ЭТАП 1/5</span>
                    </div>
                    <div class="quest" id="questText">Загрузка...</div>
                    <div id="actionButtons" class="action-buttons"></div>
                    <div class="system-comment" id="systemComment">
                        <i class="fas fa-robot"></i> Система: загрузка...
                    </div>
                </div>
                <div class="chat-tool">
                    <i class="fas fa-comments"></i> Подсказка (50% лжи)
                    <button id="hintBtn" class="btn-hint"><i class="fas fa-question-circle"></i> ВЗЯТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалки -->
    <div id="finalModal" class="modal hidden">
        <div class="modal-content"><h2>🔮 ПРИГОВОР СИСТЕМЫ</h2><p id="finalVerdict"></p><p id="finalDesc"></p><button id="closeFinal" class="modal-btn">ЗАВЕРШИТЬ</button></div>
    </div>
    <div id="infoModal" class="modal hidden"><div class="modal-content"><h3 id="infoTitle"></h3><p id="infoMsg"></p><button id="closeInfo" class="modal-btn">ПОНЯЛ</button></div></div>
    <div id="hintModal" class="modal hidden"><div class="modal-content"><h3>💡 ПОДСКАЗКА</h3><p id="hintMsg"></p><button id="closeHint" class="modal-btn">ЗАКРЫТЬ</button></div></div>
    <div id="skipModal" class="modal hidden"><div class="modal-content"><h2>⚠️ ВЫБОР</h2><p>Пропустить задание или усложнить?</p><button id="skipTaskBtn" class="modal-btn">🎁 ПРОПУСТИТЬ (+15 стресс, -10 доверия)</button><button id="doubleTaskBtn" class="modal-btn risk">💀 УСЛОЖНИТЬ</button><button id="refuseSkipBtn" class="modal-btn">🙅‍♂️ ОТКАЗАТЬСЯ</button></div></div>

    <script>
        (function(){
            // ---------------------- ОГРОМНЫЙ БАНК ЗАДАНИЙ ----------------------
            // Базовые шаблоны спин-заданий (ставки будут умножаться на множитель этапа)
            const SPIN_TEMPLATES = [
                { name: "Dog House", baseBet: 20, spins: 50, stressSuccess: -3, stressFail: 6, trustChange: 1 },
                { name: "Gates of Olympus", baseBet: 15, spins: 80, stressSuccess: -2, stressFail: 5, trustChange: 0 },
                { name: "Sweet Bonanza", baseBet: 10, spins: 100, stressSuccess: -2, stressFail: 5, trustChange: 0 },
                { name: "Money Train 4", baseBet: 1000, spins: 1, isBonus: true, stressSuccess: -6, stressFail: 12, trustChange: 2 },
                { name: "Le Bandit", baseBet: 18, spins: 70, stressSuccess: -4, stressFail: 10, trustChange: 1 },
                { name: "Sugar Rush", baseBet: 20, spins: 90, stressSuccess: -3, stressFail: 9, trustChange: 1 },
                { name: "Crazy Time", baseBet: 10, spins: 1, isBonus: true, stressSuccess: -5, stressFail: 15, trustChange: 2 },
                { name: "Hot Fiesta", baseBet: 21, spins: 60, stressSuccess: -3, stressFail: 8, trustChange: 1 },
                { name: "Le Pharaon", baseBet: 750, spins: 1, isBonus: true, stressSuccess: -8, stressFail: 20, trustChange: 3 },
                { name: "Mummy", baseBet: 360, spins: 1, isBonus: true, stressSuccess: -7, stressFail: 18, trustChange: 2 },
                { name: "Le Cowboy", baseBet: 25, spins: 80, stressSuccess: -5, stressFail: 12, trustChange: 2 },
                { name: "Pirates Pub", baseBet: 12, spins: 100, stressSuccess: -3, stressFail: 7, trustChange: 1 },
                { name: "Retro Sweet", baseBet: 400, spins: 1, isBonus: true, stressSuccess: -6, stressFail: 14, trustChange: 2 },
                { name: "Dog House Multihold", baseBet: 600, spins: 1, isBonus: true, stressSuccess: -5, stressFail: 13, trustChange: 2 },
                { name: "Sweet Rush Bonanza", baseBet: 500, spins: 1, isBonus: true, stressSuccess: -5, stressFail: 11, trustChange: 2 }
            ];

            // Вопросы с 3-4 вариантами ответов
            const QUESTION_TASKS = [
                { text: "Какой слот имеет самый высокий RTP (по данным системы)?", 
                  options: ["Blood Suckers (98%)", "Mega Joker (99%)", "Starburst (96%)", "Book of Dead (94%)"], correct: 1,
                  stressWin: -5, stressLose: 12, trustWin: 6, trustLose: -8 },
                { text: "В каком бонусе Money Train 4 максимальный множитель?", 
                  options: ["Бесплатные спины", "Бонусная игра с коллекторами", "Рывок", "Случайный множитель"], correct: 1,
                  stressWin: -4, stressLose: 14, trustWin: 5, trustLose: -7 },
                { text: "Какой провайдер создал слот Le Bandit?", 
                  options: ["Pragmatic Play", "Hacksaw Gaming", "NoLimit City", "Play'n GO"], correct: 1,
                  stressWin: -6, stressLose: 16, trustWin: 7, trustLose: -9 },
                { text: "Что означает 'ретриггер' в Sugar Rush?", 
                  options: ["Повторный бонус", "Удвоение выигрыша", "Дополнительный спин", "Активация wild"], correct: 0,
                  stressWin: -3, stressLose: 10, trustWin: 4, trustLose: -5 },
                { text: "В какой игре Crazy Time чаще всего выпадает сектор 'Coin Flip'?", 
                  options: ["Crazy Time", "Coin Flip", "Cash Hunt", "Pachinko"], correct: 1,
                  stressWin: -4, stressLose: 13, trustWin: 5, trustLose: -6 },
                { text: "Что выгоднее: купить бонус в Sweet Bonanza за 100x или ловить вручную?", 
                  options: ["Покупать", "Ловить", "Зависит от банкролла", "Система не знает"], correct: 2,
                  stressWin: -2, stressLose: 15, trustWin: 3, trustLose: -10 },
                { text: "Какой максимальный множитель в Dog House Megaways?", 
                  options: ["x10000", "x11750", "x5000", "x25000"], correct: 1,
                  stressWin: -5, stressLose: 18, trustWin: 6, trustLose: -8 },
                { text: "В каком слоте есть функция 'Hot Mode'?", 
                  options: ["Le Bandit", "Le Cowboy", "Le Pharaon", "Le Black"], correct: 1,
                  stressWin: -4, stressLose: 12, trustWin: 5, trustLose: -6 },
                { text: "Что означает 'окупить бонус'?", 
                  options: ["Выйти в ноль", "Получить прибыль", "Не потерять депозит", "Сделать x2 от ставки"], correct: 0,
                  stressWin: -2, stressLose: 10, trustWin: 3, trustLose: -5 }
            ];

            // Прогрессия: множитель ставки от этапа
            function getBetMultiplier(stage, successStreak) {
                let base = 1 + stage * 0.5; // этап 0->1, 1->1.5, 2->2, 3->2.5, 4->3
                if (successStreak >= 3) base *= 1.5;
                return Math.min(5, base);
            }

            // Генерация спин-задания с динамической ставкой
            function generateSpinTask(stage, successStreak) {
                const template = SPIN_TEMPLATES[Math.floor(Math.random() * SPIN_TEMPLATES.length)];
                const mult = getBetMultiplier(stage, successStreak);
                let bet = Math.floor(template.baseBet * mult);
                if (bet < 1) bet = 1;
                let text = "";
                if (template.isBonus) {
                    text = `Купить бонус в ${template.name} за ${bet}$ и отыграть хотя бы 50% от ставки`;
                } else {
                    text = `Сделать ${template.spins} спинов в ${template.name} по ${bet}$ за спин`;
                }
                return {
                    text: text,
                    type: "spin",
                    stressSuccess: template.stressSuccess,
                    stressFail: template.stressFail,
                    trustChange: template.trustChange
                };
            }

            // Выбор случайного вопроса (исключая последние 3)
            let lastQuestions = [];
            function getRandomQuestion() {
                let available = QUESTION_TASKS.filter(q => !lastQuestions.includes(q.text));
                if (available.length === 0) available = QUESTION_TASKS;
                const q = { ...available[Math.floor(Math.random() * available.length)] };
                lastQuestions.push(q.text);
                if (lastQuestions.length > 3) lastQuestions.shift();
                return q;
            }

            // ========== СОСТОЯНИЕ ==========
            let game = {
                stage: 0,
                completedCount: 0,
                stress: 30,
                trust: 50,
                riskyChoices: 0,
                safeChoices: 0,
                mistakes: 0,
                successStreak: 0,
                failStreak: 0,
                lastTasks: [] // храним последние 5 текстов заданий, чтобы не повторялись
            };
            let currentTask = null;
            let pendingHint = null;
            let skipOfferCount = 0;

            // DOM
            const els = {
                phaseList: document.getElementById('phaseList'),
                stressFill: document.getElementById('stressFill'),
                stressValue: document.getElementById('stressValue'),
                trustFill: document.getElementById('trustFill'),
                trustValue: document.getElementById('trustValue'),
                phaseFill: document.getElementById('phaseFill'),
                phaseNum: document.getElementById('phaseNum'),
                phaseNameBadge: document.getElementById('phaseNameBadge'),
                questText: document.getElementById('questText'),
                actionButtons: document.getElementById('actionButtons'),
                resetBtn: document.getElementById('resetBtn'),
                systemComment: document.getElementById('systemComment'),
                hintBtn: document.getElementById('hintBtn'),
                riskStat: document.getElementById('riskStat'),
                safeStat: document.getElementById('safeStat'),
                mistakeStat: document.getElementById('mistakeStat'),
                streakStat: document.getElementById('streakStat')
            };

            function showSystemMessage(msg, isUrgent = false) {
                els.systemComment.innerHTML = `<i class="fas fa-robot"></i> ${msg}`;
                if(isUrgent) els.systemComment.style.borderLeftColor = "#ffaa33";
                else els.systemComment.style.borderLeftColor = "#ff3366";
                setTimeout(() => {
                    if(els.systemComment.innerHTML.includes(msg))
                        els.systemComment.innerHTML = `<i class="fas fa-robot"></i> Система: ожидание...`;
                }, 4000);
            }

            function triggerGlitch() {
                document.body.classList.add('glitch');
                setTimeout(() => document.body.classList.remove('glitch'), 200);
                if(window.audioCtx) {
                    const osc = window.audioCtx.createOscillator();
                    const gain = window.audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(window.audioCtx.destination);
                    osc.type = "sawtooth";
                    gain.gain.setValueAtTime(0.08, window.audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, window.audioCtx.currentTime+0.3);
                    osc.frequency.value = 300 + Math.random()*200;
                    osc.start();
                    osc.stop(window.audioCtx.currentTime+0.25);
                }
            }

            function triggerJumpScare() {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sawtooth';
                    osc.frequency.value = 800 + Math.random() * 300;
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.6);
                } catch(e) {}
                document.body.style.filter = 'invert(1) brightness(2)';
                setTimeout(() => document.body.style.filter = '', 200);
                const scareDiv = document.createElement('div');
                scareDiv.style.position = 'fixed';
                scareDiv.style.top = '0';
                scareDiv.style.left = '0';
                scareDiv.style.width = '100%';
                scareDiv.style.height = '100%';
                scareDiv.style.background = 'rgba(0,0,0,0.9)';
                scareDiv.style.zIndex = '9999';
                scareDiv.style.display = 'flex';
                scareDiv.style.alignItems = 'center';
                scareDiv.style.justifyContent = 'center';
                scareDiv.innerHTML = '<div style="background: black; padding: 20px; border-radius: 40px; border: 3px solid red;"><i class="fas fa-skull" style="font-size: 80px; color: red;"></i><p style="color:red; margin-top:10px;">ОШИБКА!</p></div>';
                document.body.appendChild(scareDiv);
                setTimeout(() => scareDiv.remove(), 800);
            }

            function updateUI() {
                const stageIndex = Math.min(4, Math.floor(game.completedCount / 8));
                game.stage = stageIndex;
                const stage = STAGES[game.stage];
                const done = game.completedCount - (stageIndex * 8);
                const percent = Math.min(100, (done / stage.missions) * 100);
                els.phaseFill.style.width = percent + '%';
                els.stressFill.style.width = game.stress + '%';
                els.stressValue.innerText = game.stress;
                els.trustFill.style.width = game.trust + '%';
                els.trustValue.innerText = game.trust;
                els.phaseNum.innerText = game.stage + 1;
                els.phaseNameBadge.innerText = `${stage.name} (${game.stage+1}/5)`;
                els.riskStat.innerText = game.riskyChoices;
                els.safeStat.innerText = game.safeChoices;
                els.mistakeStat.innerText = game.mistakes;
                els.streakStat.innerText = game.successStreak;
                renderStageMap();
                if(game.stress > 70) triggerGlitch();
            }

            function renderStageMap() {
                els.phaseList.innerHTML = '';
                STAGES.forEach((s, idx) => {
                    const done = Math.max(0, Math.min(s.missions, game.completedCount - idx*8));
                    const div = document.createElement('div');
                    div.className = `phase-item ${idx === game.stage ? 'active' : ''}`;
                    div.innerHTML = `<div class="phase-icon"><i class="fas ${s.icon}"></i></div><div>${s.name}</div><div style="margin-left:auto;">${done}/${s.missions}</div>`;
                    div.addEventListener('click', () => { if(idx <= game.stage) showSystemMessage("Нельзя переключать этапы вручную."); });
                    els.phaseList.appendChild(div);
                });
            }

            function getNextTask() {
                let task = null;
                let attempts = 0;
                const isQuestion = (Math.random() < 0.35); // 35% вопросы, 65% спины
                do {
                    if (isQuestion) {
                        task = getRandomQuestion();
                        task.type = "question";
                    } else {
                        task = generateSpinTask(game.stage, game.successStreak);
                        task.type = "spin";
                    }
                    attempts++;
                    if (attempts > 20) break;
                } while (game.lastTasks.includes(task.text));
                game.lastTasks.push(task.text);
                if (game.lastTasks.length > 5) game.lastTasks.shift();
                return task;
            }

            function handleSpinResult(success) {
                const task = currentTask;
                if (success) {
                    let stressDelta = task.stressSuccess;
                    if (game.successStreak >= 2) stressDelta -= 2; // бонус за серию
                    game.stress = Math.max(0, game.stress + stressDelta);
                    game.trust = Math.min(100, game.trust + (task.trustChange || 1));
                    game.successStreak++;
                    game.failStreak = 0;
                    showSystemMessage(`✅ Задание выполнено! Стресс ${stressDelta}%, доверие +${task.trustChange || 1}.`);
                } else {
                    let stressDelta = task.stressFail;
                    if (game.failStreak >= 1) stressDelta += 3;
                    game.stress = Math.min(100, game.stress + stressDelta);
                    game.trust = Math.max(0, game.trust - 2);
                    game.failStreak++;
                    game.successStreak = 0;
                    game.mistakes++;
                    triggerJumpScare();
                    showSystemMessage(`❌ Задание провалено! Стресс +${stressDelta}%, доверие -2.`);
                }
                game.completedCount++;
                if (game.completedCount >= 40) { finishGame(); return; }
                updateUI();
                saveGame();
                loadNewTask();
            }

            function handleQuestionAnswer(selectedIndex) {
                const task = currentTask;
                const isCorrect = (selectedIndex === task.correct);
                if (isCorrect) {
                    game.stress = Math.max(0, game.stress + (task.stressWin || -4));
                    game.trust = Math.min(100, game.trust + (task.trustWin || 5));
                    game.successStreak++;
                    game.failStreak = 0;
                    showSystemMessage(`✅ Верно! Стресс ${task.stressWin || -4}%, доверие +${task.trustWin || 5}.`);
                } else {
                    game.stress = Math.min(100, game.stress + (task.stressLose || 12));
                    game.trust = Math.max(0, game.trust + (task.trustLose || -8));
                    game.failStreak++;
                    game.successStreak = 0;
                    game.mistakes++;
                    triggerJumpScare();
                    showSystemMessage(`❌ Неверно! Стресс +${task.stressLose || 12}%, доверие ${task.trustLose || -8}%.`);
                }
                game.completedCount++;
                if (game.completedCount >= 40) { finishGame(); return; }
                updateUI();
                saveGame();
                loadNewTask();
            }

            function renderCurrentTask() {
                if (!currentTask) return;
                els.questText.innerText = currentTask.text;
                els.actionButtons.innerHTML = "";
                if (currentTask.type === "spin") {
                    const btnSuccess = document.createElement('button');
                    btnSuccess.innerText = "✅ ВЫПОЛНЕНО";
                    btnSuccess.className = "btn-success";
                    btnSuccess.onclick = () => handleSpinResult(true);
                    const btnFail = document.createElement('button');
                    btnFail.innerText = "❌ ПРОВАЛЕНО";
                    btnFail.className = "btn-fail";
                    btnFail.onclick = () => handleSpinResult(false);
                    els.actionButtons.appendChild(btnSuccess);
                    els.actionButtons.appendChild(btnFail);
                } else {
                    currentTask.options.forEach((opt, idx) => {
                        const btn = document.createElement('button');
                        btn.innerText = opt;
                        btn.className = "option-btn";
                        btn.onclick = () => handleQuestionAnswer(idx);
                        els.actionButtons.appendChild(btn);
                    });
                }
                if (pendingHint) {
                    showSystemMessage(`💡 Подсказка: ${pendingHint}`, false);
                    pendingHint = null;
                }
            }

            function loadNewTask() {
                currentTask = getNextTask();
                if (currentTask.type === "question" && Math.random() < 0.4) {
                    const isTruth = (game.trust > 60) ? (Math.random() < 0.7) : (Math.random() < 0.3);
                    if (isTruth) {
                        pendingHint = currentTask.options[currentTask.correct];
                    } else {
                        let wrong = Math.floor(Math.random() * currentTask.options.length);
                        while (wrong === currentTask.correct) wrong = Math.floor(Math.random() * currentTask.options.length);
                        pendingHint = currentTask.options[wrong];
                    }
                }
                renderCurrentTask();
                saveGame();
                setTimeout(() => maybeOfferSkip(), 300);
            }

            function maybeOfferSkip() {
                if (skipOfferCount >= 3) return;
                if (game.completedCount > 0 && game.completedCount % 5 === 0 && !document.getElementById('skipModal').classList.contains('hidden') === false) {
                    skipOfferCount++;
                    const modal = document.getElementById('skipModal');
                    modal.classList.remove('hidden');
                    document.getElementById('skipTaskBtn').onclick = () => {
                        modal.classList.add('hidden');
                        game.stress = Math.min(100, game.stress + 15);
                        game.trust = Math.max(0, game.trust - 10);
                        game.completedCount++;
                        if (game.completedCount >= 40) finishGame();
                        updateUI();
                        showSystemMessage("Ты пропустил задание. +15 стресса, -10 доверия.", true);
                        saveGame();
                        loadNewTask();
                    };
                    document.getElementById('doubleTaskBtn').onclick = () => {
                        modal.classList.add('hidden');
                        game.successStreak = 3; // принудительно усложним следующее
                        showSystemMessage("СЛЕДУЮЩЕЕ ЗАДАНИЕ БУДЕТ СЛОЖНЫМ!", true);
                        loadNewTask();
                    };
                    document.getElementById('refuseSkipBtn').onclick = () => {
                        modal.classList.add('hidden');
                        showSystemMessage("Отказ принят. Продолжаем.", true);
                        loadNewTask();
                    };
                }
            }

            function showHint() {
                if (currentTask && currentTask.type === "question") {
                    const isTruth = (game.trust > 60) ? (Math.random() < 0.6) : (Math.random() < 0.2);
                    let hintMsg;
                    if (isTruth) {
                        hintMsg = `Вероятно, правильный ответ — "${currentTask.options[currentTask.correct]}"`;
                    } else {
                        let wrong = Math.floor(Math.random() * currentTask.options.length);
                        while (wrong === currentTask.correct) wrong = Math.floor(Math.random() * currentTask.options.length);
                        hintMsg = `Вероятно, правильный ответ — "${currentTask.options[wrong]}"`;
                    }
                    document.getElementById('hintMsg').innerHTML = hintMsg + "<br><small>(система может ошибаться)</small>";
                    document.getElementById('hintModal').classList.remove('hidden');
                    game.mistakes++;
                    game.trust = Math.max(0, game.trust - 2);
                    updateUI();
                } else {
                    showSystemMessage("Подсказка не работает для спин-заданий. Просто сделай спины.", true);
                }
            }

            function finishGame() {
                let verdict = "", desc = "";
                if (game.stress < 30 && game.mistakes < 5) {
                    verdict = "🔓 ОСВОБОДИЛСЯ"; desc = "Ты сохранил рассудок и победил систему!";
                } else if (game.stress > 70 || game.mistakes > 8) {
                    verdict = "💀 СЛОМАЛСЯ"; desc = "Система сломала тебя. Ты проиграл.";
                } else if (game.trust > 70) {
                    verdict = "🤖 СТАЛ ЧАСТЬЮ СИСТЕМЫ"; desc = "Ты слишком доверял системе. Теперь ты её часть.";
                } else {
                    verdict = "⚠️ НЕОПРЕДЕЛЁННОСТЬ"; desc = "Финал остался открытым. Система потеряла интерес.";
                }
                document.getElementById('finalVerdict').innerText = verdict;
                document.getElementById('finalDesc').innerText = desc;
                document.getElementById('finalModal').classList.remove('hidden');
                document.getElementById('closeFinal').onclick = () => { resetGame(); };
            }

            function resetGame() {
                if(confirm("Сбросить весь прогресс?")) {
                    localStorage.removeItem('mindGameFinal');
                    location.reload();
                }
            }

            function saveGame() {
                localStorage.setItem('mindGameFinal', JSON.stringify({
                    completedCount: game.completedCount,
                    stress: game.stress,
                    trust: game.trust,
                    riskyChoices: game.riskyChoices,
                    safeChoices: game.safeChoices,
                    mistakes: game.mistakes,
                    successStreak: game.successStreak,
                    failStreak: game.failStreak,
                    skipOfferCount: skipOfferCount,
                    lastTasks: game.lastTasks
                }));
            }

            function loadGame() {
                const saved = localStorage.getItem('mindGameFinal');
                if(saved) {
                    const data = JSON.parse(saved);
                    game.completedCount = data.completedCount || 0;
                    game.stress = data.stress || 30;
                    game.trust = data.trust || 50;
                    game.riskyChoices = data.riskyChoices || 0;
                    game.safeChoices = data.safeChoices || 0;
                    game.mistakes = data.mistakes || 0;
                    game.successStreak = data.successStreak || 0;
                    game.failStreak = data.failStreak || 0;
                    skipOfferCount = data.skipOfferCount || 0;
                    game.lastTasks = data.lastTasks || [];
                }
                if(game.completedCount > 40) game.completedCount = 40;
                updateUI();
            }

            let scareInterval = null;
            function startRandomScares() {
                if (scareInterval) clearInterval(scareInterval);
                scareInterval = setInterval(() => {
                    if (Math.random() < 0.2 && game.stress < 90) {
                        const scares = ["СИСТЕМА: ТЫ НЕ ОДИН", "Ошибка... или нет?", "Я вижу, как ты читаешь", "Твой пульс участился", "Глитч... реальность искажается"];
                        showSystemMessage(scares[Math.floor(Math.random() * scares.length)], true);
                        triggerGlitch();
                        game.stress = Math.min(100, game.stress + 2);
                        updateUI();
                    }
                }, 120000);
            }

            const STAGES = [
                { name: "ДОВЕРИЕ", icon: "fa-hand-peace", missions: 8 },
                { name: "СОМНЕНИЕ", icon: "fa-question", missions: 8 },
                { name: "ДАВЛЕНИЕ", icon: "fa-weight-hanging", missions: 8 },
                { name: "ЛОМКА", icon: "fa-skull", missions: 8 },
                { name: "ФИНАЛ", icon: "fa-crown", missions: 8 }
            ];

            function init() {
                loadGame();
                updateUI();
                loadNewTask();
                startRandomScares();
                window.audioCtx = null;
                document.body.addEventListener('click', () => {
                    if(!window.audioCtx && window.AudioContext) {
                        window.audioCtx = new AudioContext();
                        window.audioCtx.resume();
                    }
                });
                els.resetBtn.addEventListener('click', resetGame);
                els.hintBtn.addEventListener('click', showHint);
                document.getElementById('closeHint')?.addEventListener('click', () => document.getElementById('hintModal').classList.add('hidden'));
                document.getElementById('closeInfo')?.addEventListener('click', () => document.getElementById('infoModal').classList.add('hidden'));
                console.log("Игра с прогрессией сложности запущена");
            }
            init();
        })();
    </script>
</body>
</html>
